{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Assessment Charts | Victory Academy</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar-custom {
            background-color: #1D2F5F;
        }

        .navbar-custom .navbar-brand,
        .navbar-custom .nav-link,
        .navbar-custom .navbar-text {
            color: #fff;
            font-weight: 600;
        }

        .navbar-custom .nav-link:hover {
            color: #FFA500;
        }

        .back-btn {
            background-color: #FF8C00;
            color: white;
            border: none;
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background-color: #e67300;
        }

        h2 {
            text-align: center;
            margin: 30px 0 10px;
            font-weight: bold;
            color: #1D2F5F;
        }

        .chart-wrapper {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 20px;
        }

        .chart-container {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            padding: 20px;
            width: 400px;
            height: 350px;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>

<!-- 🧭 Navbar -->
<nav class="navbar navbar-expand-lg navbar-custom sticky-top">
    <div class="container-fluid d-flex justify-content-between align-items-center">

        <!-- 🔙 Back Button -->
        <div>
            <a href="{% url 'parent_dashboard' %}" class="btn back-btn">
                ← Back
            </a>
        </div>

        <!-- 🔤 Centered Child Name -->
        {% if child %}
        <div class="text-center">
            <span class="navbar-text text-white fs-5">
                ⚽ Viewing Performance of: <strong>{{ child.name }}</strong>
            </span>
        </div>
        {% endif %}

        <!-- 🏫 Logo & Academy Name -->
        <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="{% static 'images/logo.png' %}" alt="Logo" width="40" height="40" class="me-2">
            Victory Academy
        </a>
    </div>
</nav>

<!-- 🔥 Combined Chart Section -->
<h2 class="text-center mt-4">Overall Performance Summary</h2>
<div class="chart-wrapper">
    <div class="chart-container" style="width: 90%; max-width: 900px;">
        <canvas id="combinedChart"></canvas>
    </div>
</div>

<!-- 🔰 Category Charts Section -->
<h2>Skills Breakdown</h2>
<div class="chart-wrapper">
    <div class="chart-container"><canvas id="cognitiveChart"></canvas></div>
    <div class="chart-container"><canvas id="technicalChart"></canvas></div>
    <div class="chart-container"><canvas id="physicalChart"></canvas></div>
    <div class="chart-container"><canvas id="psychologicalChart"></canvas></div>
</div>

<!-- 🧠 Chart Config -->
<script>
    const cognitiveData = {
        labels: ['Spatial Awareness', 'Decision Making'],
        datasets: [{
            label: 'Cognitive',
            data: [{{ avg_data.spatial_awareness|default:0 }}, {{ avg_data.decision_making|default:0 }}],
            backgroundColor: ['#0074D9', '#7FDBFF']
        }]
    };

    const technicalData = {
        labels: ['Ball Control', 'Passing'],
        datasets: [{
            label: 'Technical',
            data: [{{ avg_data.ball_control|default:0 }}, {{ avg_data.passing|default:0 }}],
            backgroundColor: ['#2ECC40', '#01FF70']
        }]
    };

    const physicalData = {
        labels: ['Stamina', 'Speed'],
        datasets: [{
            label: 'Physical',
            data: [{{ avg_data.stamina|default:0 }}, {{ avg_data.speed|default:0 }}],
            backgroundColor: ['#FF851B', '#FF4136']
        }]
    };

    const psychologicalData = {
        labels: ['Confidence'],
        datasets: [{
            label: 'Psychological',
            data: [{{ avg_data.confidence|default:0 }}],
            backgroundColor: ['#B10DC9']
        }]
    };

    new Chart(document.getElementById('cognitiveChart'), {
        type: 'bar',
        data: cognitiveData,
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true }
            }
        }
    });

    new Chart(document.getElementById('technicalChart'), {
        type: 'bar',
        data: technicalData,
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true }
            }
        }
    });

    new Chart(document.getElementById('physicalChart'), {
        type: 'bar',
        data: physicalData,
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true }
            }
        }
    });

    new Chart(document.getElementById('psychologicalChart'), {
        type: 'bar',
        data: psychologicalData,
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true }
            }
        }
    });

    // 🔄 Combined Overall Chart
    const combinedData = {
        labels: [
            'Spatial Awareness',
            'Decision Making',
            'Ball Control',
            'Passing',
            'Stamina',
            'Speed',
            'Confidence'
        ],
        datasets: [{
            label: 'Average Skill Scores',
            data: [
                {{ avg_data.spatial_awareness|default:0 }},
                {{ avg_data.decision_making|default:0 }},
                {{ avg_data.ball_control|default:0 }},
                {{ avg_data.passing|default:0 }},
                {{ avg_data.stamina|default:0 }},
                {{ avg_data.speed|default:0 }},
                {{ avg_data.confidence|default:0 }}
            ],
            backgroundColor: [
                '#0074D9', '#7FDBFF',
                '#2ECC40', '#01FF70',
                '#FF851B', '#FF4136',
                '#B10DC9'
            ],
            borderColor: '#1D2F5F',
            borderWidth: 1
        }]
    };

    new Chart(document.getElementById('combinedChart'), {
        type: 'bar',
        data: combinedData,
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: 'Score'
                    }
                }
            },
            plugins: {
                legend: { display: false },
                title: {
                    display: true,
                    text: 'Combined Skill Analysis'
                }
            }
        }
    });
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
