<div class="p-6 max-w-xl mx-auto">

    <h2 class="text-lg font-bold mb-4">Create Event</h2>

    <form method="POST" class="space-y-4">
        {% csrf_token %}

        <input type="text" name="title" placeholder="Event Title"
               class="w-full p-2 rounded bg-gray-800 text-white" required>

        <textarea name="description" placeholder="Description"
                  class="w-full p-2 rounded bg-gray-800 text-white" required></textarea>

        <input type="date" name="date"
               class="w-full p-2 rounded bg-gray-800 text-white" required>

        <input type="time" name="time"
               class="w-full p-2 rounded bg-gray-800 text-white" required>

        <input type="text" name="location" placeholder="Location"
               class="w-full p-2 rounded bg-gray-800 text-white" required>

        <button type="submit"
                class="bg-green-500 px-4 py-2 rounded text-white font-bold">
            Create Event
        </button>

    </form>

</div>
