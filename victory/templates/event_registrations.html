<div class="p-6">

    <h2 class="text-lg font-bold mb-4">
        Registrations - {{ event.title }}
    </h2>

    <div class="space-y-3">

        {% for reg in registrations %}
        <div class="p-3 bg-gray-800 rounded flex justify-between">

            <span>{{ reg.child.name }}</span>
            <span class="text-sm text-gray-400">
                {{ reg.registered_at }}
            </span>

        </div>
        {% empty %}
        <p>No registrations yet.</p>
        {% endfor %}

    </div>

</div>
